<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramak Kala Bildirimi</title>
  <style>
    :root {
      --brand-blue: #1786dc;
      --brand-blue-dark: #0f6db7;
      --brand-blue-soft: #eef7ff;
      --text: #162033;
      --muted: #6b7280;
      --card: rgba(255, 255, 255, 0.97);
      --border: #dbe7f3;
      --shadow: 0 18px 40px rgba(15, 23, 42, 0.10);
      --bg1: #edf4fa;
      --bg2: #e7edf3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(23, 134, 220, 0.12), transparent 25%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 620px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(23, 134, 220, 0.08);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 34px 34px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--brand-blue) 0%, #6cc6ff 100%);
    }

    .logo {
      width: min(100%, 230px);
      height: auto;
      display: block;
      margin: 0 auto 10px;
    }

    .unit {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      color: #16233b;
      letter-spacing: -0.5px;
    }

    .subtitle {
      margin: 14px auto 0;
      max-width: 420px;
      font-size: 16px;
      line-height: 1.6;
      color: var(--muted);
    }

    .helper {
      margin: 22px auto 0;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 14px;
      background: var(--brand-blue-soft);
      color: var(--brand-blue-dark);
      font-size: 14px;
      line-height: 1.5;
      font-weight: 600;
    }

    .actions {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      display: block;
      width: 100%;
      text-decoration: none;
      border-radius: 18px;
      padding: 18px 18px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--brand-blue) 0%, #2697ef 100%);
      color: white;
      box-shadow: 0 12px 24px rgba(23, 134, 220, 0.22);
    }

    .btn.secondary {
      background: #ffffff;
      color: var(--brand-blue-dark);
      border: 2px solid #b9d8f3;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
    }

    .btn.secondary:hover {
      background: #f8fbff;
    }

    .btn-title {
      display: block;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }

    .btn-subtitle {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0.95;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #9aa4b2;
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .card {
        padding: 26px 18px 20px;
        border-radius: 22px;
      }

      .logo {
        width: min(100%, 200px);
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 15px;
      }

      .btn-title {
        font-size: 18px;
      }

      .btn {
        padding: 16px 14px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <img src="Lactalis Logo_TR.png" alt="Lactalis Türkiye" class="logo">

      <div class="unit">Yapay Zeka &amp; Dijital Dönüşüm Departmanı</div>

      <h1>Ramak Kala Bildirimi</h1>

      <p class="subtitle">
        Lütfen size uygun bildirim yöntemini seçin.
      </p>

      <div class="helper">
        Kurumsal hesabınız yoksa Hızlı Bildirim seçeneğini kullanın.
      </div>

      <div class="actions">
        <a class="btn primary"
           href="https://forms.office.com/Pages/ResponsePage.aspx?id=yWyWm7niOU-192Ls0D-kKkgb2VAfM39Jj6z_OEPeqLZUMktNSTE4RjE3U0E1TE1FNDVRMFhPNVg3VC4u"
           target="_blank"
           rel="noopener noreferrer">
          <span class="btn-title">Hızlı Bildirim</span>
          <span class="btn-subtitle">Giriş gerektirmez</span>
        </a>

        <a class="btn secondary"
           href="https://apps.powerapps.com/play/e/default-9b966cc9-e2b9-4f39-b5f7-62ecd03fa42a/a/b8fb0d14-458e-4a49-83d6-6700845691dd?tenantId=9b966cc9-e2b9-4f39-b5f7-62ecd03fa42a&hint=2d447f36-a3f8-4802-87ac-92541c5f6f0e&sourcetime=1773323258653"
           target="_blank"
           rel="noopener noreferrer">
          <span class="btn-title">Kurumsal Giriş</span>
          <span class="btn-subtitle">Power Apps ile devam et</span>
        </a>
      </div>

      <div class="footer">
        Lactalis Türkiye Ramak Kala yönlendirme ekranı
      </div>
    </div>
  </div>
</body>
</html>
